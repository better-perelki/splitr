server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
    }

    location /v3/ {
        proxy_pass http://backend:8080;
    }

    location /swagger-ui {
        proxy_pass http://backend:8080;
    }
}
