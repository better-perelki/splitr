server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/splitr
    username: splitr
    password: splitr
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
